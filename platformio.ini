; f-tank ESP32 firmware — PlatformIO project config
; See docs/REQUIREMENTS.md for the authoritative spec.

[platformio]
default_envs = esp32dev
src_dir = src
include_dir = include
test_dir = test

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Custom partition table: dual OTA app slots + nvs + spiffs + coredump (FR-38/39).
board_build.partitions = partitions.csv

; Deep scan so transitive deps (e.g. Adafruit BusIO -> SPI) resolve.
lib_ldf_mode = deep+

; Project-wide defines (applied to libraries too).
build_flags =
	-DCORE_DEBUG_LEVEL=3

; Strict flags applied ONLY to our own sources (third-party libs excluded so
; their warnings don't break our build). Enforces code-quality instruction.
build_src_flags =
	-Wall
	-Wextra
	-Werror

; Hardware driver libraries (pinned major versions).
lib_deps =
	Wire
	SPI
	adafruit/RTClib@^2.1.4
	paulstoffregen/OneWire@^2.3.8
	olikraus/U8g2@^2.35.30

; ---- Native unit-test environment (pure logic, no hardware) ----
[env:native]
platform = native
; Pure logic is header-only; don't compile the Arduino src tree natively.
build_src_filter = -<*>
build_flags =
	-std=gnu++17
	-Wall
	-Wextra
	-I src
