; f-tank ESP32 firmware — PlatformIO project config
; See docs/REQUIREMENTS.md for the authoritative spec.

[platformio]
default_envs = esp32_8mb_full
src_dir = src
include_dir = include
test_dir = test

; ---- Shared base for all firmware SKUs (not built directly) ----
[firmware_base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Deep scan so transitive deps (e.g. Adafruit BusIO -> SPI) resolve.
lib_ldf_mode = deep+

; Project-wide defines (applied to libraries too).
build_flags =
	-DCORE_DEBUG_LEVEL=3

; Strict flags applied ONLY to our own sources (third-party libs excluded so
; their warnings don't break our build). Enforces code-quality instruction.
build_src_flags =
	-Wall
	-Wextra
	-Werror

; Hardware driver libraries (pinned major versions).
lib_deps =
	Wire
	SPI
	adafruit/RTClib@^2.1.4
	paulstoffregen/OneWire@^2.3.8
	olikraus/U8g2@^2.35.30
	bblanchon/ArduinoJson@^7.1.0
	esp32async/ESPAsyncWebServer@^3.6.0
	esp32async/AsyncTCP@^3.3.2
	h2zero/NimBLE-Arduino@^2.1.0

; ---- 8 MB "Full" SKU: scheduling + connectivity + OTA + cloud + logging ----
[env:esp32_8mb_full]
extends = firmware_base
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
board_build.partitions = partitions_8mb.csv
build_flags =
	${firmware_base.build_flags}
	-DFT_FEATURE_CLOUD=1
	-DFT_FEATURE_SD_LOG=1
	-DFT_FEATURE_OTA=1

; ---- 4 MB "Basic" SKU (cost-optimized): no cloud, no persistent logging ----
[env:esp32_4mb_basic]
extends = firmware_base
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = partitions_4mb.csv
build_flags =
	${firmware_base.build_flags}
	-DFT_FEATURE_CLOUD=0
	-DFT_FEATURE_SD_LOG=0
	-DFT_FEATURE_OTA=1

; ---- Native unit-test environment (pure logic, no hardware) ----
[env:native]
platform = native
; Pure logic is header-only; don't compile the Arduino src tree natively.
build_src_filter = -<*>
build_flags =
	-std=gnu++17
	-Wall
	-Wextra
	-I src
